    <div class="container">
        <h1>Welcome to ❌⭕❌❌ Mixes</h1>          
        <section>
            <div id="loading-message" class="loading-message" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Loading mixes...
            </div>
            
            <div id="mixes-container" class="mixes-grid">
                <!-- Mix cards will be dynamically inserted here -->
            </div>
            
            <div id="no-mixes" class="no-mixes" style="display: none;">
                <p>No mixes available yet.</p>
            </div>
        </section>
    </div> 

    <template id="mix-card-template">
        <div class="mix-card">
            <audio preload="metadata" crossorigin="anonymous"></audio>
            
            <div class="mix-header">
                <div class="mix-info">
                    <h3 class="mix-title"></h3>
                    <p class="mix-artist"></p>
                    <p class="mix-genre"></p>
                    <p class="error-message" style="display: none;">
                        <i class="fas fa-exclamation-circle"></i>
                        Audio unavailable
                    </p>
                </div>
                <button class="like-btn">
                    <i class="far fa-heart"></i>
                </button>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="time-display">
                    <span class="current-time">0:00</span>
                    <span class="total-time">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="play-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="download-btn">
                    <i class="fas fa-download"></i>
                </button>
                <button class="share-btn">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        </div>
    </template>
